name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify release tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          NPM_TOKEN="${NODE_AUTH_TOKEN:-}"

          echo "Attempting npm trusted publishing."
          unset NODE_AUTH_TOKEN
          if npm publish; then
            exit 0
          fi

          if [ -n "$NPM_TOKEN" ]; then
            echo "Trusted publishing failed; retrying with NPM_TOKEN."
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
            npm publish --provenance
          else
            echo "Trusted publishing failed and NPM_TOKEN is not configured." >&2
            exit 1
          fi
