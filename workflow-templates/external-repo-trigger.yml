# Dispatch a Mintlifier version freeze to a separate documentation repository.

name: Trigger Mintlifier Version Freeze

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version label to freeze. Defaults to the release tag for release events.'
        required: false
      next_version:
        description: 'Next development version label'
        required: false
        default: 'next'
      version_scope:
        description: 'Versioned navigation scope for product-scoped docs'
        required: false
      docs_repo:
        description: 'Documentation repository, such as owner/docs'
        required: false
      run_mintlify_checks:
        description: 'Ask the docs workflow to run Mintlify validation'
        type: boolean
        default: false

env:
  DOCS_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}

jobs:
  trigger-version-freeze:
    runs-on: ubuntu-latest

    steps:
      - name: Determine trigger inputs
        id: inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_VERSION="${{ github.event.release.tag_name }}"
            NEXT_VERSION="${{ vars.MINTLIFIER_NEXT_VERSION || 'next' }}"
            VERSION_SCOPE="${{ vars.MINTLIFIER_VERSION_SCOPE }}"
            DOCS_REPO="${{ vars.MINTLIFIER_DOCS_REPO }}"
            RUN_MINTLIFY_CHECKS="${{ vars.MINTLIFIER_RUN_MINTLIFY_CHECKS || 'false' }}"
          else
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
            NEXT_VERSION="${{ github.event.inputs.next_version }}"
            VERSION_SCOPE="${{ github.event.inputs.version_scope }}"
            DOCS_REPO="${{ github.event.inputs.docs_repo || vars.MINTLIFIER_DOCS_REPO }}"
            RUN_MINTLIFY_CHECKS="${{ github.event.inputs.run_mintlify_checks }}"
          fi

          NEXT_VERSION="${NEXT_VERSION:-next}"
          RUN_MINTLIFY_CHECKS="${RUN_MINTLIFY_CHECKS:-false}"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "release_version is required for manual runs" >&2
            exit 1
          fi

          if [ -z "$DOCS_REPO" ]; then
            echo "docs_repo is required. Set the MINTLIFIER_DOCS_REPO repository variable or provide the manual input." >&2
            exit 1
          fi

          if [ -z "$DOCS_TOKEN" ]; then
            echo "DOCS_REPO_TOKEN is required. Create a token with permission to dispatch workflows in $DOCS_REPO." >&2
            exit 1
          fi

          if [ "$RUN_MINTLIFY_CHECKS" != "true" ] && [ "$RUN_MINTLIFY_CHECKS" != "false" ]; then
            echo "run_mintlify_checks must be true or false" >&2
            exit 1
          fi

          {
            echo "release_version=$RELEASE_VERSION"
            echo "next_version=$NEXT_VERSION"
            echo "version_scope=$VERSION_SCOPE"
            echo "docs_repo=$DOCS_REPO"
            echo "run_mintlify_checks=$RUN_MINTLIFY_CHECKS"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch docs repository freeze workflow
        shell: bash
        run: |
          set -euo pipefail

          PAYLOAD="$(jq -n \
            --arg release_version "${{ steps.inputs.outputs.release_version }}" \
            --arg next_version "${{ steps.inputs.outputs.next_version }}" \
            --arg version_scope "${{ steps.inputs.outputs.version_scope }}" \
            --arg run_mintlify_checks "${{ steps.inputs.outputs.run_mintlify_checks }}" \
            --arg source_repo "${{ github.repository }}" \
            --arg triggered_by "${{ github.actor }}" \
            --arg trigger_workflow "${{ github.workflow }}" \
            --arg trigger_run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              event_type: "freeze-version",
              client_payload: {
                release_version: $release_version,
                next_version: $next_version,
                version_scope: $version_scope,
                run_mintlify_checks: $run_mintlify_checks,
                source_repo: $source_repo,
                triggered_by: $triggered_by,
                trigger_workflow: $trigger_workflow,
                trigger_run: $trigger_run
              }
            }')"

          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ steps.inputs.outputs.docs_repo }}/dispatches" \
            -d "$PAYLOAD"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Mintlifier Freeze Dispatch Summary"
            echo ""
            echo "- Documentation repository: \`${{ steps.inputs.outputs.docs_repo }}\`"
            echo "- Source repository: \`${{ github.repository }}\`"
            echo "- Frozen version: \`${{ steps.inputs.outputs.release_version }}\`"
            echo "- Next development version: \`${{ steps.inputs.outputs.next_version }}\`"
            echo "- Version scope: \`${{ steps.inputs.outputs.version_scope || 'global navigation' }}\`"
            echo "- Mintlify checks: \`${{ steps.inputs.outputs.run_mintlify_checks }}\`"
            echo ""
            echo "Next step: check the docs repository Actions tab for the \`freeze-version\` repository dispatch run."
          } >> "$GITHUB_STEP_SUMMARY"
