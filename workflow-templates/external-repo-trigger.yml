# External Repository Workflow Template
# Deploy this workflow in your source/project repository to trigger documentation updates
# in your separate documentation repository

name: Trigger Documentation Update

on:
  # Trigger on new releases
  release:
    types: [published]
  
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      action:
        description: 'Documentation action to trigger'
        required: true
        type: choice
        options:
          - 'sync-changelog'
          - 'freeze-version'
          - 'both'
      release_version:
        description: 'Version to freeze (required for freeze/both)'
        required: false
      next_version:
        description: 'Next development version (auto-generated if not provided)'
        required: false
      docs_repo:
        description: 'Documentation repository (owner/repo)'
        required: false
        default: 'YOUR_ORG/YOUR_DOCS_REPO'  # Update this default

env:
  # Configure your documentation repository here
  DOCS_REPO: ${{ github.event.inputs.docs_repo || 'YOUR_ORG/YOUR_DOCS_REPO' }}
  # You need to create a PAT with repo scope and add it as a secret
  DOCS_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}

jobs:
  trigger-docs-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Determine parameters
        id: params
        run: |
          # Determine action based on trigger
          if [ "${{ github.event_name }}" = "release" ]; then
            ACTION="both"
            RELEASE_VERSION="${{ github.event.release.tag_name }}"
            # Auto-generate next version (increment patch)
            NEXT_VERSION=$(echo "$RELEASE_VERSION" | awk -F. '{
              if (NF==3) {
                $NF = $NF + 1;
                print $1"."$2"."$3
              } else {
                print $0"-next"
              }
            }')
          else
            ACTION="${{ github.event.inputs.action }}"
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
            NEXT_VERSION="${{ github.event.inputs.next_version }}"
            
            # Auto-generate next version if not provided but needed
            if [[ "$ACTION" == "freeze-version" || "$ACTION" == "both" ]]; then
              if [ -z "$NEXT_VERSION" ] && [ -n "$RELEASE_VERSION" ]; then
                NEXT_VERSION=$(echo "$RELEASE_VERSION" | awk -F. '{
                  if (NF==3) {
                    $NF = $NF + 1;
                    print $1"."$2"."$3
                  } else {
                    print $0"-next"
                  }
                }')
              fi
            fi
          fi
          
          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          
          # Log parameters
          echo " Documentation Update Parameters:"
          echo "  - Repository: ${{ env.DOCS_REPO }}"
          echo "  - Action: $ACTION"
          echo "  - Release Version: $RELEASE_VERSION"
          echo "  - Next Version: $NEXT_VERSION"
          echo "  - Source Repository: ${{ github.repository }}"

      - name: Validate parameters
        run: |
          # Check if token is configured
          if [ -z "${{ env.DOCS_TOKEN }}" ]; then
            echo " Error: DOCS_REPO_TOKEN secret is not configured"
            echo "Please create a Personal Access Token with 'repo' scope and add it as a secret"
            exit 1
          fi
          
          # Check if docs repo is configured
          if [[ "${{ env.DOCS_REPO }}" == *"YOUR_"* ]]; then
            echo " Error: Documentation repository is not configured"
            echo "Please update the DOCS_REPO environment variable with your documentation repository"
            exit 1
          fi
          
          # Validate required parameters for version freezing
          ACTION="${{ steps.params.outputs.action }}"
          if [[ "$ACTION" == "freeze-version" || "$ACTION" == "both" ]]; then
            if [ -z "${{ steps.params.outputs.release_version }}" ] || [ -z "${{ steps.params.outputs.next_version }}" ]; then
              echo " Error: release_version and next_version are required for version freezing"
              exit 1
            fi
          fi

      - name: Trigger changelog sync
        if: steps.params.outputs.action == 'sync-changelog'
        run: |
          echo " Triggering changelog sync in ${{ env.DOCS_REPO }}..."
          
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ env.DOCS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ env.DOCS_REPO }}/dispatches \
            -d '{
              "event_type": "sync-changelog",
              "client_payload": {
                "source_version": "${{ steps.params.outputs.release_version || 'latest' }}",
                "source_repo": "${{ github.repository }}",
                "triggered_by": "${{ github.actor }}",
                "trigger_workflow": "${{ github.workflow }}",
                "trigger_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }'
          
          echo " Changelog sync triggered successfully"

      - name: Trigger version freeze
        if: steps.params.outputs.action == 'freeze-version'
        run: |
          echo " Triggering version freeze in ${{ env.DOCS_REPO }}..."
          
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ env.DOCS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ env.DOCS_REPO }}/dispatches \
            -d '{
              "event_type": "freeze-version",
              "client_payload": {
                "release_version": "${{ steps.params.outputs.release_version }}",
                "next_version": "${{ steps.params.outputs.next_version }}",
                "update_changelog": false,
                "source_repo": "${{ github.repository }}",
                "triggered_by": "${{ github.actor }}",
                "trigger_workflow": "${{ github.workflow }}",
                "trigger_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }'
          
          echo " Version freeze triggered successfully"

      - name: Trigger combined update
        if: steps.params.outputs.action == 'both'
        run: |
          echo " Triggering full documentation update in ${{ env.DOCS_REPO }}..."
          
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ env.DOCS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ env.DOCS_REPO }}/dispatches \
            -d '{
              "event_type": "docs-automation",
              "client_payload": {
                "action": "both",
                "release_version": "${{ steps.params.outputs.release_version }}",
                "next_version": "${{ steps.params.outputs.next_version }}",
                "source_version": "${{ steps.params.outputs.release_version }}",
                "source_repo": "${{ github.repository }}",
                "triggered_by": "${{ github.actor }}",
                "trigger_workflow": "${{ github.workflow }}",
                "trigger_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }'
          
          echo " Documentation update triggered successfully"

      - name: Summary
        if: always()
        run: |
          echo "##  Documentation Trigger Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Documentation Repository**: \`${{ env.DOCS_REPO }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Repository**: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Action" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ steps.params.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.params.outputs.action }}" == "freeze-version" || "${{ steps.params.outputs.action }}" == "both" ]]; then
            echo "- **Release Version**: \`${{ steps.params.outputs.release_version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Next Version**: \`${{ steps.params.outputs.next_version }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the [${{ env.DOCS_REPO }}](https://github.com/${{ env.DOCS_REPO }}/actions) repository for the triggered workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. A pull request will be created for review" >> $GITHUB_STEP_SUMMARY
          echo "3. Review and merge the PR to update the documentation" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo " **Documentation update triggered successfully!**" >> $GITHUB_STEP_SUMMARY
          fi