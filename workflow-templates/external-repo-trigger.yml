# Dispatch a Mintlifier version freeze to a separate documentation repository.

name: Trigger Mintlifier Version Freeze

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version label to freeze. Defaults to the release tag for release events.'
        required: false
      next_version:
        description: 'Next development version label'
        required: false
        default: 'next'
      version_scope:
        description: 'Versioned navigation scope for product-scoped docs'
        required: false
      docs_repo:
        description: 'Documentation repository, such as owner/docs'
        required: false
      run_mintlify_checks:
        description: 'Ask the docs workflow to run Mintlify validation'
        type: boolean
        default: false

env:
  DOCS_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}

jobs:
  trigger-version-freeze:
    runs-on: ubuntu-latest

    steps:
      - name: Determine trigger inputs
        id: inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DEFAULT_NEXT_VERSION: ${{ vars.MINTLIFIER_NEXT_VERSION || 'next' }}
          DEFAULT_VERSION_SCOPE: ${{ vars.MINTLIFIER_VERSION_SCOPE }}
          DEFAULT_DOCS_REPO: ${{ vars.MINTLIFIER_DOCS_REPO }}
          DEFAULT_RUN_CHECKS: ${{ vars.MINTLIFIER_RUN_MINTLIFY_CHECKS || 'false' }}
          MANUAL_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          MANUAL_NEXT_VERSION: ${{ github.event.inputs.next_version }}
          MANUAL_VERSION_SCOPE: ${{ github.event.inputs.version_scope }}
          MANUAL_DOCS_REPO: ${{ github.event.inputs.docs_repo }}
          MANUAL_RUN_CHECKS: ${{ github.event.inputs.run_mintlify_checks }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            RELEASE_VERSION="$RELEASE_TAG"
            NEXT_VERSION="$DEFAULT_NEXT_VERSION"
            VERSION_SCOPE="$DEFAULT_VERSION_SCOPE"
            DOCS_REPO="$DEFAULT_DOCS_REPO"
            RUN_MINTLIFY_CHECKS="$DEFAULT_RUN_CHECKS"
          else
            RELEASE_VERSION="$MANUAL_RELEASE_VERSION"
            NEXT_VERSION="$MANUAL_NEXT_VERSION"
            VERSION_SCOPE="$MANUAL_VERSION_SCOPE"
            DOCS_REPO="${MANUAL_DOCS_REPO:-$DEFAULT_DOCS_REPO}"
            RUN_MINTLIFY_CHECKS="$MANUAL_RUN_CHECKS"
          fi

          NEXT_VERSION="${NEXT_VERSION:-next}"
          RUN_MINTLIFY_CHECKS="${RUN_MINTLIFY_CHECKS:-false}"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "release_version is required for manual runs" >&2
            exit 1
          fi

          if [ -z "$DOCS_REPO" ]; then
            echo "docs_repo is required. Set the MINTLIFIER_DOCS_REPO repository variable or provide the manual input." >&2
            exit 1
          fi

          if [ -z "$DOCS_TOKEN" ]; then
            echo "DOCS_REPO_TOKEN is required. Create a token with permission to dispatch workflows in $DOCS_REPO." >&2
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[A-Za-z0-9._-]+$ ]] ||
             [[ ! "$NEXT_VERSION" =~ ^[A-Za-z0-9._-]+$ ]] ||
             [[ ! "$VERSION_SCOPE" =~ ^[A-Za-z0-9._:-]*$ ]] ||
             [[ ! "$DOCS_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid version, scope, or docs repository input" >&2
            exit 1
          fi

          if [ "$RUN_MINTLIFY_CHECKS" != "true" ] && [ "$RUN_MINTLIFY_CHECKS" != "false" ]; then
            echo "run_mintlify_checks must be true or false" >&2
            exit 1
          fi

          {
            echo "release_version=$RELEASE_VERSION"
            echo "next_version=$NEXT_VERSION"
            echo "version_scope=$VERSION_SCOPE"
            echo "docs_repo=$DOCS_REPO"
            echo "run_mintlify_checks=$RUN_MINTLIFY_CHECKS"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch docs repository freeze workflow
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.inputs.outputs.release_version }}
          NEXT_VERSION: ${{ steps.inputs.outputs.next_version }}
          VERSION_SCOPE: ${{ steps.inputs.outputs.version_scope }}
          RUN_MINTLIFY_CHECKS: ${{ steps.inputs.outputs.run_mintlify_checks }}
          DOCS_REPO: ${{ steps.inputs.outputs.docs_repo }}
          SOURCE_REPO: ${{ github.repository }}
          TRIGGERED_BY: ${{ github.actor }}
          TRIGGER_WORKFLOW: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          PAYLOAD="$(jq -n \
            --arg release_version "$RELEASE_VERSION" \
            --arg next_version "$NEXT_VERSION" \
            --arg version_scope "$VERSION_SCOPE" \
            --arg run_mintlify_checks "$RUN_MINTLIFY_CHECKS" \
            --arg source_repo "$SOURCE_REPO" \
            --arg triggered_by "$TRIGGERED_BY" \
            --arg trigger_workflow "$TRIGGER_WORKFLOW" \
            --arg trigger_run "$SERVER_URL/$SOURCE_REPO/actions/runs/$RUN_ID" \
            '{
              event_type: "freeze-version",
              client_payload: {
                release_version: $release_version,
                next_version: $next_version,
                version_scope: $version_scope,
                run_mintlify_checks: $run_mintlify_checks,
                source_repo: $source_repo,
                triggered_by: $triggered_by,
                trigger_workflow: $trigger_workflow,
                trigger_run: $trigger_run
              }
            }')"

          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$DOCS_REPO/dispatches" \
            -d "$PAYLOAD"

      - name: Summary
        if: always()
        shell: bash
        env:
          DOCS_REPO: ${{ steps.inputs.outputs.docs_repo }}
          SOURCE_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.inputs.outputs.release_version }}
          NEXT_VERSION: ${{ steps.inputs.outputs.next_version }}
          VERSION_SCOPE: ${{ steps.inputs.outputs.version_scope || 'global navigation' }}
          RUN_MINTLIFY_CHECKS: ${{ steps.inputs.outputs.run_mintlify_checks }}
        run: |
          {
            echo "## Mintlifier Freeze Dispatch Summary"
            echo ""
            echo "- Documentation repository: \`$DOCS_REPO\`"
            echo "- Source repository: \`$SOURCE_REPO\`"
            echo "- Frozen version: \`$RELEASE_VERSION\`"
            echo "- Next development version: \`$NEXT_VERSION\`"
            echo "- Version scope: \`$VERSION_SCOPE\`"
            echo "- Mintlify checks: \`$RUN_MINTLIFY_CHECKS\`"
            echo ""
            echo "Next step: check the docs repository Actions tab for the \`freeze-version\` repository dispatch run."
          } >> "$GITHUB_STEP_SUMMARY"
