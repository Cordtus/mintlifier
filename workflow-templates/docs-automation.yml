# Deprecated Workflow: Combined Documentation Automation
#
# This former combined workflow mixed changelog backfill, release automation,
# and version snapshot freezing. Keep those flows separate: use
# freeze-version.yml for filesystem snapshots, sync-changelog.yml for historical
# markdown changelog import/backfill, and Mintlify-native features for hosted
# deployment, preview, CI, and ongoing content-maintenance automation.
#
# Keep this file as a non-mutating deprecation notice for old references.
# New projects should use:
# - freeze-version.yml for Mintlifier version snapshots.
# - sync-changelog.yml for historical changelog import/backfill.
# - Mintlify Automations for ongoing changelog/content maintenance.
# - Mintlify GitHub App and CI checks for deployment and supplemental validation.

name: Deprecated - Documentation Automation

on:
  workflow_dispatch:
  repository_dispatch:
    types: [docs-automation]

permissions:
  contents: read

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        shell: bash
        run: |
          echo "::warning title=Deprecated workflow::Use freeze-version.yml for snapshots, sync-changelog.yml for historical imports, and Mintlify native Automations, CI checks, and deployments for hosted platform work."
          {
            echo "## Deprecated Workflow"
            echo ""
            echo "\`docs-automation.yml\` is deprecated because the combined workflow hides which parts are Mintlifier-specific and which parts are Mintlify-native."
            echo ""
            echo "Use these replacements:"
            echo "- \`freeze-version.yml\` for deterministic version snapshot PRs."
            echo "- \`sync-changelog.yml\` for historical markdown changelog import/backfill."
            echo "- Mintlify Automations for changelog drafting and recurring content maintenance."
            echo "- Mintlify GitHub App deployments and preview deployments after merge."
            echo "- Mintlify CI checks or \`mint validate\` / \`mint broken-links\` as supplemental validation until replacement coverage is confirmed."
          } >> "$GITHUB_STEP_SUMMARY"
