# Import a public repository changelog into a Mintlify release-notes page.

name: Backfill Changelog

on:
  workflow_dispatch:
    inputs:
      source_version:
        description: 'Source version, tag, or branch to import. Use latest for the latest GitHub release.'
        required: false
        default: 'latest'
      source_repo:
        description: 'Source repository containing the changelog, such as owner/repo'
        required: false
      run_mintlify_checks:
        description: 'Run Mintlify validation after import'
        type: boolean
        default: false

  repository_dispatch:
    types: [sync-changelog]
    # Payload:
    # - source_version: version, tag, branch, or "latest"
    # - source_repo: source repository containing CHANGELOG.md, CHANGES.md, or HISTORY.md
    # - run_mintlify_checks: "true" or "false", defaults to "false"

env:
  CHANGELOG_SOURCE_REPO: ${{ vars.CHANGELOG_SOURCE_REPO }}

permissions:
  contents: write
  pull-requests: write

jobs:
  backfill-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout documentation repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine changelog source
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SOURCE_VERSION: ${{ github.event.client_payload.source_version }}
          DISPATCH_SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          DISPATCH_RUN_CHECKS: ${{ github.event.client_payload.run_mintlify_checks }}
          MANUAL_SOURCE_VERSION: ${{ github.event.inputs.source_version }}
          MANUAL_SOURCE_REPO: ${{ github.event.inputs.source_repo }}
          MANUAL_RUN_CHECKS: ${{ github.event.inputs.run_mintlify_checks }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            SOURCE_VERSION="$DISPATCH_SOURCE_VERSION"
            SOURCE_REPO="$DISPATCH_SOURCE_REPO"
            RUN_MINTLIFY_CHECKS="$DISPATCH_RUN_CHECKS"
          else
            SOURCE_VERSION="$MANUAL_SOURCE_VERSION"
            SOURCE_REPO="$MANUAL_SOURCE_REPO"
            RUN_MINTLIFY_CHECKS="$MANUAL_RUN_CHECKS"
          fi

          SOURCE_VERSION="${SOURCE_VERSION:-latest}"
          SOURCE_REPO="${SOURCE_REPO:-${CHANGELOG_SOURCE_REPO:-}}"
          RUN_MINTLIFY_CHECKS="${RUN_MINTLIFY_CHECKS:-false}"

          if [ -z "$SOURCE_REPO" ]; then
            echo "source_repo is required, or set the CHANGELOG_SOURCE_REPO repository variable" >&2
            exit 1
          fi

          if [[ ! "$SOURCE_VERSION" =~ ^[A-Za-z0-9._/-]+$ ]] ||
             [[ ! "$SOURCE_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid source version or repository" >&2
            exit 1
          fi

          if [ "$RUN_MINTLIFY_CHECKS" != "true" ] && [ "$RUN_MINTLIFY_CHECKS" != "false" ]; then
            echo "run_mintlify_checks must be true or false" >&2
            exit 1
          fi

          SAFE_SOURCE="$(printf '%s' "$SOURCE_VERSION" | tr -c 'A-Za-z0-9._-' '-')"

          {
            echo "source_version=$SOURCE_VERSION"
            echo "source_repo=$SOURCE_REPO"
            echo "safe_source=$SAFE_SOURCE"
            echo "run_mintlify_checks=$RUN_MINTLIFY_CHECKS"
          } >> "$GITHUB_OUTPUT"

      - name: Import changelog
        id: import
        shell: bash
        env:
          SOURCE_REPO: ${{ steps.source.outputs.source_repo }}
          SOURCE_VERSION: ${{ steps.source.outputs.source_version }}
        run: |
          set -euo pipefail

          ./scripts/refresh-changelog.sh \
            "$SOURCE_REPO" \
            "$SOURCE_VERSION"

          if [ -n "$(git status --porcelain docs/changelog/release-notes.mdx)" ]; then
            VERSION_COUNT="$(grep -c '<Update' docs/changelog/release-notes.mdx || true)"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "version_count=$VERSION_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "version_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Mintlify checks
        if: steps.import.outputs.has_changes == 'true' && steps.source.outputs.run_mintlify_checks == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npx --yes mint@latest validate
          npx --yes mint@latest broken-links

      - name: Create pull request
        if: steps.import.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: import changelog from ${{ steps.source.outputs.source_repo }} ${{ steps.source.outputs.source_version }}'
          title: 'Import changelog from ${{ steps.source.outputs.source_repo }}'
          body: |
            ## Changelog Import

            Imported release notes from `${{ steps.source.outputs.source_repo }}` at `${{ steps.source.outputs.source_version }}`.

            ### Changes
            - Updated `docs/changelog/release-notes.mdx`.
            - Generated `${{ steps.import.outputs.version_count }}` Mintlify `Update` entries.

            ### Review Checklist
            - [ ] Imported version list is complete.
            - [ ] Category mapping is correct.
            - [ ] Release-note wording still reads correctly after conversion.
            - [ ] Links and issue references are acceptable.
            - [ ] Mintlify checks passed or were intentionally skipped.
          branch: mintlifier-changelog-${{ steps.source.outputs.safe_source }}
          delete-branch: true
          labels: |
            documentation
            changelog
            automated
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      - name: Summary
        if: always()
        shell: bash
        env:
          SOURCE_REPO: ${{ steps.source.outputs.source_repo }}
          SOURCE_VERSION: ${{ steps.source.outputs.source_version }}
          VERSION_COUNT: ${{ steps.import.outputs.version_count || '0' }}
          HAS_CHANGES: ${{ steps.import.outputs.has_changes || 'false' }}
          RUN_MINTLIFY_CHECKS: ${{ steps.source.outputs.run_mintlify_checks }}
        run: |
          {
            echo "## Changelog Import Summary"
            echo ""
            echo "- Source repository: \`$SOURCE_REPO\`"
            echo "- Source version: \`$SOURCE_VERSION\`"
            echo "- Imported versions: \`$VERSION_COUNT\`"
            echo "- Changes detected: \`$HAS_CHANGES\`"
            echo "- Supplemental Mintlify checks: \`$RUN_MINTLIFY_CHECKS\`"
          } >> "$GITHUB_STEP_SUMMARY"
