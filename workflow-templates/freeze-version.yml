# Freeze a Mintlifier version snapshot and open a pull request.

name: Freeze Mintlifier Version Snapshot

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version label to freeze, such as v1.0.0, v0.53, or v8.5.x'
        required: true
      next_version:
        description: 'Next development version label'
        required: false
        default: 'next'
      version_scope:
        description: 'Versioned navigation scope for product-scoped docs'
        required: false
      run_mintlify_checks:
        description: 'Run Mintlify validation after freezing'
        type: boolean
        default: false

  repository_dispatch:
    types: [freeze-version]
    # Payload:
    # - release_version: version label to freeze
    # - next_version: next development version label, defaults to "next"
    # - version_scope: versioned navigation scope for product-scoped docs
    # - run_mintlify_checks: "true" or "false", defaults to "false"

env:
  MINTLIFIER_PACKAGE: mintlifier@latest

permissions:
  contents: write
  pull-requests: write

jobs:
  freeze-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout documentation repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine freeze inputs
        id: inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RELEASE_VERSION="${{ github.event.client_payload.release_version }}"
            NEXT_VERSION="${{ github.event.client_payload.next_version }}"
            VERSION_SCOPE="${{ github.event.client_payload.version_scope }}"
            RUN_MINTLIFY_CHECKS="${{ github.event.client_payload.run_mintlify_checks }}"
          else
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
            NEXT_VERSION="${{ github.event.inputs.next_version }}"
            VERSION_SCOPE="${{ github.event.inputs.version_scope }}"
            RUN_MINTLIFY_CHECKS="${{ github.event.inputs.run_mintlify_checks }}"
          fi

          NEXT_VERSION="${NEXT_VERSION:-next}"
          RUN_MINTLIFY_CHECKS="${RUN_MINTLIFY_CHECKS:-false}"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "release_version is required" >&2
            exit 1
          fi

          if [ "$RUN_MINTLIFY_CHECKS" != "true" ] && [ "$RUN_MINTLIFY_CHECKS" != "false" ]; then
            echo "run_mintlify_checks must be true or false" >&2
            exit 1
          fi

          SAFE_VERSION="$(printf '%s' "$RELEASE_VERSION" | tr -c 'A-Za-z0-9._-' '-')"
          if [ -n "$VERSION_SCOPE" ]; then
            SCOPE_LABEL="$VERSION_SCOPE"
          else
            SCOPE_LABEL="global navigation"
          fi

          {
            echo "release_version=$RELEASE_VERSION"
            echo "next_version=$NEXT_VERSION"
            echo "version_scope=$VERSION_SCOPE"
            echo "scope_label=$SCOPE_LABEL"
            echo "safe_version=$SAFE_VERSION"
            echo "run_mintlify_checks=$RUN_MINTLIFY_CHECKS"
          } >> "$GITHUB_OUTPUT"

      - name: Freeze documentation version
        id: freeze
        shell: bash
        run: |
          set -euo pipefail

          SCOPE_ARGS=()
          if [ -n "${{ steps.inputs.outputs.version_scope }}" ]; then
            SCOPE_ARGS=(--scope "${{ steps.inputs.outputs.version_scope }}")
          fi

          npx --yes "$MINTLIFIER_PACKAGE" freeze \
            "${SCOPE_ARGS[@]}" \
            --version "${{ steps.inputs.outputs.release_version }}" \
            --next-version "${{ steps.inputs.outputs.next_version }}" \
            --automated

          echo "frozen=true" >> "$GITHUB_OUTPUT"

      - name: Run Mintlify checks
        if: steps.inputs.outputs.run_mintlify_checks == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npx --yes mint@latest validate
          npx --yes mint@latest broken-links

      - name: Create pull request
        if: steps.freeze.outputs.frozen == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            docs: freeze ${{ steps.inputs.outputs.release_version }}

            - Freeze documentation at ${{ steps.inputs.outputs.release_version }}
            - Set next development version to ${{ steps.inputs.outputs.next_version }}
            - Scope: ${{ steps.inputs.outputs.scope_label }}
          title: 'Freeze docs ${{ steps.inputs.outputs.release_version }}'
          body: |
            ## Version Freeze

            Frozen `${{ steps.inputs.outputs.release_version }}` and retained `${{ steps.inputs.outputs.next_version }}` for active development.

            ### Changes
            - Created the version snapshot.
            - Updated `docs.json` and `versions.json`.
            - Scope: `${{ steps.inputs.outputs.scope_label }}`

            ### Review Checklist
            - [ ] Version labels are correct.
            - [ ] Frozen docs render in the expected version selector or product scope.
            - [ ] Internal links in frozen docs point at the frozen version.
            - [ ] Mintlify checks passed or were intentionally skipped.
            - [ ] No unrelated files are included.
          branch: mintlifier-freeze-${{ steps.inputs.outputs.safe_version }}
          delete-branch: true
          labels: |
            documentation
            versioning
            automated
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Mintlifier Version Freeze Summary"
            echo ""
            echo "- Frozen version: \`${{ steps.inputs.outputs.release_version }}\`"
            echo "- Next development version: \`${{ steps.inputs.outputs.next_version }}\`"
            echo "- Scope: \`${{ steps.inputs.outputs.scope_label }}\`"
            echo "- Mintlify checks: \`${{ steps.inputs.outputs.run_mintlify_checks }}\`"
            echo "- Pull request branch: \`mintlifier-freeze-${{ steps.inputs.outputs.safe_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
